            const wrapper = document.getElementById('toast-wrapper');

            toast.className = `flex items-center gap-3 p-4 rounded-xl shadow-xl transition-all duration-300 translate-y-2 opacity-0 pointer-events-auto min-w-[280px] max-w-sm border ${type === 'success' ? 'bg-emerald-950/90 text-emerald-300 border-emerald-800' : 'bg-rose-950/90 text-rose-300 border-rose-800'}`;
            const icon = type === 'success' ? 'check-circle' : 'alert-circle';
            toast.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5 flex-shrink-0 ${type === 'success' ? 'text-emerald-400' : 'text-rose-400'}"></i><span class="text-xs font-semibold leading-relaxed">${message}</span>`;
            wrapper.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => toast.classList.remove('translate-y-2', 'opacity-0'), 10);
            setTimeout(() => { toast.classList.add('translate-y-2', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3500);
        }

        function applyStaticIdentity() {
            document.querySelectorAll('.dynamic-site-name').forEach(el => el.innerText = siteName);
            document.querySelectorAll('.dynamic-site-sub').forEach(el => el.innerText = siteSubtitle);
            document.getElementById('site-title-meta').innerText = siteName + " - " + siteSubtitle;

            const txtLogo = document.getElementById('site-logo-txt');
            const imgLogo = document.getElementById('site-logo-img');
            const mobileLogo = document.getElementById('mobile-logo-wrapper');
            
            if (homeImageUrl && homeImageUrl.startsWith('http')) {
                txtLogo.classList.add('hidden');
                imgLogo.src = homeImageUrl;
                imgLogo.classList.remove('hidden');
            } else {
                txtLogo.classList.remove('hidden');
                txtLogo.innerText = defaultLogoText;
                imgLogo.classList.add('hidden');
            }
            if (mobileLogo) mobileLogo.innerText = defaultLogoText;
        }

        function toggleMobileSidebar() {
            const sidebar = document.getElementById('sidebar'), overlay = document.getElementById('mobile-overlay');
            isMobileSidebarOpen = !isMobileSidebarOpen;
            if (isMobileSidebarOpen) { sidebar.classList.remove('-translate-x-full'); overlay.classList.remove('hidden'); } 
            else { sidebar.classList.add('-translate-x-full'); overlay.classList.add('hidden'); }
        }

        function toggleDropdown(id) {
            const elem = document.getElementById('drop-' + id), icon = document.getElementById('icon-' + id);
            if (elem.classList.contains('hidden')) { elem.classList.remove('hidden'); icon.style.transform = 'rotate(180deg)'; } 
            else { elem.classList.add('hidden'); icon.style.transform = 'rotate(0deg)'; }
        }

        function navigate(section) {
            currentSection = section;
            document.querySelectorAll('aside nav button').forEach(btn => btn.classList.remove('nav-active'));
            const activeBtn = document.getElementById('menu-btn-' + section);
            if (activeBtn) activeBtn.classList.add('nav-active');
            if (isMobileSidebarOpen) toggleMobileSidebar();
            renderContent();
        }

        function renderContent() {
            const container = document.getElementById('content-container');
            if (currentSection === 'mentors') { container.innerHTML = renderMentorsCRUD(); lucide.createIcons(); return; }

            let pageData = localStateContents[currentSection] || { title: 'Modul Belum Terdaftar', body: '<p>Konten sedang dipersiapkan.</p>', links: [] };

            let html = `<div class="space-y-6">`;
            if (currentSection === 'beranda' && homeImageUrl) {
                html += `
                    <div class="w-full h-52 md:h-80 rounded-2xl overflow-hidden shadow-2xl border border-slate-800 relative group">
                        <img src="${homeImageUrl}" class="w-full h-full object-cover group-hover:scale-105 transition duration-700">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-950/20 to-transparent p-6 flex flex-col justify-end">
                            <h3 class="text-xl md:text-2xl font-black text-white uppercase">${pageData.title}</h3>
                        </div>
                    </div>`;
            }
            html += `
                <div class="border-b border-slate-800/80 pb-4 flex justify-between items-center">
                    <h2 class="text-xl md:text-2xl font-extrabold text-white tracking-tight flex items-center gap-2.5">
                        <span class="w-1.5 h-6 bg-amber-500 rounded-full inline-block"></span> ${pageData.title}
                    </h2>
                </div>
                <div class="prose prose-invert max-w-none text-slate-300 leading-relaxed text-sm md:text-base space-y-4">${pageData.body}</div>`;

            if (pageData.links && pageData.links.length > 0) {
                html += `<div class="pt-6 border-t border-slate-800/85 flex flex-wrap gap-3">`;
                pageData.links.forEach(link => {
                    html += `<a href="${link.url}" target="_blank" class="px-5 py-2.5 bg-slate-850 hover:bg-slate-800 border border-slate-700 text-amber-400 font-extrabold text-xs rounded-xl inline-flex items-center gap-2 transition"><span>${link.text}</span> <i data-lucide="external-link" class="w-4 h-4"></i></a>`;
                });
                html += `</div>`;
            }
            html += `</div>`;
            container.innerHTML = html; lucide.createIcons();
        }

        // --- SISTEM PENDAMPING (MENTORS) ---
        function renderMentorsCRUD() {
            const list = defaultMentors;
            let rows = '';
            list.forEach(m => {
                rows += `
                    <tr class="border-b border-slate-800/60 hover:bg-slate-900/30 text-xs">
                        <td class="p-4 font-bold text-slate-200">${m.name}</td>
                        <td class="p-4 text-slate-400 font-mono">${m.nip}</td>
                        <td class="p-4 text-slate-300">${m.role}</td>
                        <td class="p-4 font-semibold text-amber-400">${m.phone}</td>
                        <td class="p-4"><span class="px-2 py-0.5 rounded text-[10px] font-bold ${m.status === 'Aktif' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-slate-500/10 text-slate-400'}">${m.status}</span></td>
                    </tr>`;
            });

            return `
                <div class="space-y-6" id="mentors-capture-area">
                    <div class="border-b border-slate-800 pb-4 flex justify-between items-center">
                        <h2 class="text-xl md:text-2xl font-black text-white flex items-center gap-2"><span class="w-1.5 h-6 bg-amber-500 rounded-full"></span> Daftar Pendamping Teknis</h2>
                        <div class="flex gap-2 no-print">
                            <button onclick="exportMentorsToPDF()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-amber-400 text-xs font-bold rounded-xl flex items-center gap-2 border border-slate-700"><i data-lucide="printer" class="w-4 h-4"></i> Cetak</button>
                        </div>
                    </div>
                    <div class="border border-slate-850 bg-slate-950/20 rounded-2xl overflow-hidden shadow-xl">
                        <table class="w-full text-left border-collapse">
                            <thead><tr class="bg-slate-950 text-slate-400 font-bold border-b border-slate-800"><th class="p-4 text-xs uppercase">Nama / Jabatan</th><th class="p-4 text-xs uppercase">NIP</th><th class="p-4 text-xs uppercase">Tugas Instansi</th><th class="p-4 text-xs uppercase">WA</th><th class="p-4 text-xs uppercase">Status</th></tr></thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                </div>`;
        }

        function exportMentorsToPDF() {
            html2canvas(document.getElementById('mentors-capture-area'), { scale: 2, backgroundColor: '#0f172a' }).then(canvas => {
                const imgData = canvas.toDataURL('image/png'), { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4'), imgWidth = 190, imgHeight = (canvas.height * imgWidth) / canvas.width;
                pdf.addImage(imgData, 'PNG', 10, 15, imgWidth, imgHeight); pdf.save("Laporan_Pendamping.pdf");
            });
        }

        // --- INISIALISASI ---
        window.addEventListener('DOMContentLoaded', () => {
            applyStaticIdentity();
            navigate('beranda');
        });
    </script>
</body>
</html>
